<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 12</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Bootstrap Spacing Utilities
    </h1>

    <!-- Exercise 12.1 -->

    <h2 class="mb-4">
        Margin and Padding Example
    </h2>

    <div class="bg-primary text-white m-3 p-3">

        This section uses:
        <br>
        m-3 = margin
        <br>
        p-3 = padding

    </div>

    <div class="bg-success text-white mt-4 py-5 text-center">

        This section uses:
        <br>
        mt-4 = margin top
        <br>
        py-5 = top and bottom padding

    </div>

    <hr class="my-5">

    <!-- Exercise 12.2 -->

    <h2 class="mb-4">
        Pricing Section
    </h2>

    <div class="row">

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>Basic</h3>

                <h4>₹499</h4>

                <p>
                    Event Access
                </p>

                <button class="btn btn-primary">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>Standard</h3>

                <h4>₹999</h4>

                <p>
                    Event + Workshop Access
                </p>

                <button class="btn btn-success">
                    Choose Plan
                </button>

            </div>

        </div>

        <div class="col-md-4">

            <div class="card p-3 text-center">

                <h3>Premium</h3>

                <h4>₹1499</h4>

                <p>
                    Full Community Access
                </p>

                <button class="btn btn-danger">
                    Choose Plan
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
