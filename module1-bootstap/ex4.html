<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 4</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-4">
        Community Event Portal
    </h1>

    <!-- Exercise 4.1 -->

    <h2 class="mb-3">
        Two Column Layout
    </h2>

    <div class="row">

        <!-- Sidebar -->

        <div class="col-md-3">

            <div class="card p-3 bg-light">

                <h4>Sidebar</h4>

                <ul>
                    <li>Home</li>
                    <li>Events</li>
                    <li>Contact</li>
                </ul>

            </div>

        </div>

        <!-- Main Content -->

        <div class="col-md-9">

            <div class="card p-3">

                <h4>Main Content</h4>

                <p>
                    Welcome to the Community Event Portal.
                    This section displays event details,
                    announcements and registrations.
                </p>

            </div>

        </div>

    </div>

    <hr class="my-5">

    <!-- Exercise 4.2 -->

    <h2 class="mb-3">
        Four Equal Columns Layout
    </h2>

    <div class="row">

        <div class="col-sm-3 mb-3">

            <div class="card p-3 text-center">
                Music
            </div>

        </div>

        <div class="col-sm-3 mb-3">

            <div class="card p-3 text-center">
                Sports
            </div>

        </div>

        <div class="col-sm-3 mb-3">

            <div class="card p-3 text-center">
                Workshop
            </div>

        </div>

        <div class="col-sm-3 mb-3">

            <div class="card p-3 text-center">
                Seminar
            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
