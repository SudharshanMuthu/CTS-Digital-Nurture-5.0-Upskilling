<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Exercise 15</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="text-center text-primary mb-5">
        Borders, Shadows and Rounded Corners
    </h1>

    <!-- Exercise 15.1 -->

    <h2 class="mb-4">
        Border Utilities
    </h2>

    <img
    src="https://via.placeholder.com/200"
    alt="Profile Image"
    class="border border-primary border-3 rounded-circle p-2">

    <hr class="my-5">

    <!-- Exercise 15.2 -->

    <h2 class="mb-4">
        Shadow and Rounded Pill Card
    </h2>

    <div class="card shadow-lg p-4">

        <h3>
            Community Premium Membership
        </h3>

        <p>
            Access all community events,
            workshops and premium resources.
        </p>

        <button class="btn btn-success rounded-pill">

            Join Now

        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</html>
